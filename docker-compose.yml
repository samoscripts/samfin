services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samfin_app
    ports:
      - "3001:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: client_host=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:lts-alpine
    container_name: samfin_frontend
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    working_dir: /app
    environment:
      HOME: /app
      NPM_CONFIG_CACHE: /app/.npm-cache
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./backend/config:/backend-config
      - frontend_node_modules:/app/node_modules
      - ./backend/public/app:/app/dist
    command: sh -c "npm install && npm run dev"
    depends_on:
      - app

  db:
    image: mariadb:11
    container_name: samfin_db
    environment:
      MARIADB_DATABASE: samfin
      MARIADB_USER: samfin
      MARIADB_PASSWORD: samfin
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -usamfin -psamfin --silent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data_mysql:
  frontend_node_modules:
