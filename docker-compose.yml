services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samfin_app
    ports:
      - "3001:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: client_host=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:lts-alpine
    container_name: samfin_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - ./backend/public/app:/app/dist
    command: sh -c "npm install && npm run dev"
    depends_on:
      - app

  db:
    image: postgres:16
    container_name: samfin_db
    environment:
      POSTGRES_DB: samfin
      POSTGRES_USER: samfin
      POSTGRES_PASSWORD: samfin
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U samfin -d samfin"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  frontend_node_modules:
