<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride None
        Order Allow,Deny
        Allow from All

        RewriteEngine On

        # Pass Authorization header to PHP (Apache strips it by default with mod_rewrite)
        RewriteCond %{HTTP:Authorization} .
        RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

        # 1. Serve existing files and directories as-is
        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]

        # 2. React SPA — /app/* routes fallback to /app/index.html
        RewriteRule ^app(/.*)?$ /app/index.html [L]

        # 3. Symfony API — everything else goes to index.php
        RewriteRule ^ /index.php [L]
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
