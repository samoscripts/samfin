nelmio_cors:
    defaults:
        allow_credentials: false
        allow_origin: []
        allow_headers: []
        allow_methods: []
        expose_headers: []
        max_age: 0
    paths:
        '^/api/':
            origin_regex: true
            allow_origin: ['%env(CORS_ALLOW_ORIGIN)%']
            allow_headers:
                - 'Content-Type'
                - 'Authorization'
                - 'Accept'
                - 'X-Requested-With'
            allow_methods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
            max_age: 3600
